<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout</title>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .checkout-container {
            background: #ffffff;
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        @media(max-width: 768px) {
            .checkout-container {
                grid-template-columns: 1fr;
            }
        }

        .order-summary {
            background: #0f1111;
            color: white;
            padding: 40px;
        }

        .order-summary h2 {
            margin-top: 0;
            font-weight: 600;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .product-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .product-item img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            background: white;
            padding: 2px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 14px;
            color: #aaa;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 20px;
            font-weight: 700;
            color: white;
        }

        .payment-section {
            padding: 40px;
        }

        .payment-section h2 {
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 600;
            color: #111;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #555;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: #00b3bd;
        }

        .payment-methods {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .method-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #555;
        }

        .method-btn.active {
            border-color: #003087;
            background: #f8fbff;
            color: #003087;
        }

        .method-btn:hover {
            border-color: #aaa;
        }

        .paypal-box {
            background: #f4f8ff;
            border: 1px solid #c5d9f1;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .paypal-box.active {
            display: block;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #ffc439;
            color: #003087;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .submit-btn:hover {
            background: #f4b829;
        }
    </style>
</head>

<body>

    <div class="checkout-container">
        
        <!-- Payment Section -->
        <div class="payment-section">
            <h2>Secure Checkout</h2>

            <div class="payment-methods">
                <button type="button" class="method-btn active" id="btn-paypal" onclick="selectMethod('paypal')">
                    <i class="fab fa-paypal" style="color:#003087;"></i> PayPal
                </button>
                <button type="button" class="method-btn" id="btn-card" onclick="selectMethod('card')">
                    <i class="fas fa-credit-card"></i> Card
                </button>
            </div>

            <form id="orderForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                
                <div style="display: flex; gap: 10px;">
                    <div class="input-group" style="flex: 1;">
                        <label>Phone</label>
                        <input type="tel" id="phone" placeholder="+92 3XX XXXXXXX" required>
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>WhatsApp</label>
                        <input type="tel" id="altPhone" placeholder="+92 3XX XXXXXXX">
                    </div>
                </div>

                <div class="input-group">
                    <label>Delivery Address</label>
                    <textarea id="address" rows="2" placeholder="Street, City, Zip Code" required></textarea>
                </div>

                <!-- PayPal Login Simulation Box -->
                <div class="paypal-box active" id="paypalBox">
                    <h4 style="margin-top:0; margin-bottom:10px; color:#003087;"><i class="fab fa-paypal"></i> Log in to PayPal</h4>
                    <p style="font-size: 13px; color: #555; margin-bottom: 15px;">Your payment will be securely processed by PayPal.</p>
                    <div class="input-group">
                        <input type="email" placeholder="Email or mobile number" id="paypalEmail">
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    Pay with <span style="font-style: italic; font-weight: 900;">PayPal</span>
                </button>
            </form>
        </div>

        <!-- Order Summary Section -->
        <div class="order-summary">
            <h2>Order Summary</h2>
            
            <div class="product-item">
                <img src="https://m.media-amazon.com/images/I/81DAB2ouq+L._AC_SX679_.jpg" alt="Mat">
                <div>
                    <div style="font-weight: 600; margin-bottom: 5px;">Soccer Training Mat</div>
                    <div style="font-size: 13px; color: #aaa;">Qty: 1</div>
                </div>
                <div style="margin-left: auto; font-weight: 600;">$45.00</div>
            </div>

            <div class="summary-row">
                <span>Subtotal</span>
                <span>$45.00</span>
            </div>
            <div class="summary-row">
                <span>Shipping</span>
                <span>Free</span>
            </div>
            
            <div class="summary-total">
                <span>Total</span>
                <span>$45.00</span>
            </div>

            <div style="margin-top: 30px; font-size: 13px; color: #888; display: flex; align-items: center; gap: 8px;">
                <i class="fas fa-lock"></i> SSL Encrypted Checkout
            </div>
        </div>

    </div>

    <script>
        const supabase = window.supabaseClient;
        let selectedMethod = 'paypal';

        function selectMethod(method) {
            selectedMethod = method;
            document.getElementById('btn-paypal').classList.remove('active');
            document.getElementById('btn-card').classList.remove('active');
            document.getElementById('btn-' + method).classList.add('active');

            if (method === 'paypal') {
                document.getElementById('paypalBox').classList.add('active');
                document.getElementById('submitBtn').innerHTML = `Pay with <span style="font-style: italic; font-weight: 900;">PayPal</span>`;
                document.getElementById('submitBtn').style.background = '#ffc439';
                document.getElementById('submitBtn').style.color = '#003087';
            } else {
                document.getElementById('paypalBox').classList.remove('active');
                document.getElementById('submitBtn').innerHTML = `Complete Order`;
                document.getElementById('submitBtn').style.background = '#0f1111';
                document.getElementById('submitBtn').style.color = '#fff';
            }
        }

        // Auto-select method if passed in URL
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('method') === 'paypal') {
            selectMethod('paypal');
        }

        document.getElementById("orderForm").onsubmit = async (e) => {
            e.preventDefault();

            const name = document.getElementById("name").value;
            const phone = document.getElementById("phone").value;
            const altPhone = document.getElementById("altPhone").value;
            const address = document.getElementById("address").value;
            
            if (selectedMethod === 'paypal' && !document.getElementById("paypalEmail").value) {
                alert("Please enter your PayPal email to proceed.");
                return;
            }

            const items = [{ product: "Soccer Training Mat", qty: 1, price: 45 }];

            const orderData = {
                customer_name: name,
                customer_phone: phone + (altPhone ? " (WA: " + altPhone + ")" : ""),
                customer_address: address,
                total_amount: 45,
                items: JSON.stringify(items),
                status: 'Pending'
            };

            if (supabase) {
                const { error, data } = await supabase.from('orders').insert([orderData]).select();
                if (error) {
                    alert("Error: " + error.message);
                } else {
                    const msg = `*NEW ORDER (via ${selectedMethod.toUpperCase()})*%0AClient: ${name}%0APhone: ${phone}%0AAddress: ${address}%0ATotal: $45.00`;
                    window.open(`https://wa.me/923477128889?text=${msg}`, '_blank');
                    document.getElementById("orderForm").reset();
                }
            } else {
                alert("Demo Mode: Order Placed Successfully via " + selectedMethod.toUpperCase() + "!");
                const msg = `*NEW ORDER (via ${selectedMethod.toUpperCase()})*%0AClient: ${name}%0APhone: ${phone}%0AAddress: ${address}%0ATotal: $45.00`;
                window.open(`https://wa.me/923477128889?text=${msg}`, '_blank');
            }
        }
    </script>

</body>

</html>
